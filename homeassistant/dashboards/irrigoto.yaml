  - title: Schedule
    path: schedule
    icon: mdi:calendar-clock
    panel: true
    cards:
      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                title: Schedule
                content: >
                  {% set ha_entries =
                  (state_attr('sensor.irrigoto_desired_schedule', 'entries') |
                  default([], true)) | selectattr('device', 'equalto',
                  '<<DEV_DASH>>') | list %}

                  {% set dev_entries =
                  state_attr('sensor.<<DEV_USC>>_schedule_rest', 'entries')
                  | default([], true) %}

                  {% set MODES = ['Pulse','Gentle','Smooth'] %}

                  {% set DEPTHS = ['1/8"','1/4"'] %}

                  {% set DLET = ['S','M','T','W','T','F','S'] %}

                  {% set rows = namespace(items=[]) %}

                  {%- for e in ha_entries if (e.id | int(0)) > 0 -%}
                    {%- set ns = namespace(dev_e=none) -%}
                    {%- for d in dev_entries -%}
                      {%- if (d.id | int(0)) == (e.id | int(0)) -%}
                        {%- set ns.dev_e = d -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- set dev_e = ns.dev_e -%}
                    {%- set ha_lm = e.last_modified | int(0) -%}
                    {%- set dev_lm = (dev_e.last_modified if dev_e else 0) | int(0) -%}
                    {%- if dev_e is none -%}{%- set status = 'pending push' -%}
                    {%- elif ha_lm > dev_lm -%}{%- set status = 'pending push' -%}
                    {%- elif dev_lm > ha_lm -%}{%- set status = 'pending pull' -%}
                    {%- else -%}{%- set status = 'synced' -%}{%- endif -%}
                    {%- set rows.items = rows.items + [{'slot': e.slot | int(0), 'zone': e.zone, 'mode': e.mode, 'depth': e.depth, 'time': e.time, 'days': e.days, 'enabled': e.enabled, 'lm': ha_lm, 'status': status}] -%}
                  {%- endfor -%}

                  {%- for e in ha_entries if (e.id | int(0)) == 0 -%}
                    {%- set rows.items = rows.items + [{'slot': e.slot | int(0), 'zone': e.zone, 'mode': e.mode, 'depth': e.depth, 'time': e.time, 'days': e.days, 'enabled': e.enabled, 'lm': e.last_modified | int(0), 'status': 'new'}] -%}
                  {%- endfor -%}

                  {%- set ha_ids = ha_entries | rejectattr('id','equalto',0) |
                  map(attribute='id') | map('int') | list -%}

                  {%- for dev_e in dev_entries -%}
                    {%- if (dev_e.id | int(0)) not in ha_ids -%}
                      {%- set mask = dev_e.days_mask | int(0) -%}
                      {%- set ds = namespace(s='') -%}
                      {%- if mask == 127 -%}{%- set ds.s = 'Daily' -%}
                      {%- elif mask == 62 -%}{%- set ds.s = 'Weekdays' -%}
                      {%- elif mask == 65 -%}{%- set ds.s = 'Weekends' -%}
                      {%- elif mask == 42 -%}{%- set ds.s = 'MWF' -%}
                      {%- elif mask == 20 -%}{%- set ds.s = 'TTh' -%}
                      {%- else -%}
                        {%- for i in range(7) -%}{%- if mask | bitwise_and(2**i) > 0 -%}{%- set ds.s = ds.s ~ DLET[i] -%}{%- endif -%}{%- endfor -%}
                      {%- endif -%}
                      {%- set rows.items = rows.items + [{'slot': 0, 'zone': dev_e.zone, 'mode': MODES[dev_e.mode | int(0)], 'depth': DEPTHS[dev_e.depth | int(0)], 'time': '%02d:%02d' | format(dev_e.hour | int(0), dev_e.minute | int(0)), 'days': ds.s, 'enabled': (dev_e.enabled | int(0)) == 1, 'lm': dev_e.last_modified | int(0), 'status': 'pending pull'}] -%}
                    {%- endif -%}
                  {%- endfor -%}

                  {% if rows.items | count == 0 -%}

                  _No schedule on HA or device. Use the **Compose entry** form
                  below to add one._

                  {%- else -%}

                  <table style="font-size: 0.78em; border-collapse: collapse;">

                  <thead><tr>

                  <th style="text-align:right; padding: 2px 6px;">Slot</th>

                  <th style="text-align:left; padding: 2px 6px;">Status</th>

                  <th style="text-align:right; padding: 2px 6px;">Zone</th>

                  <th style="text-align:left; padding: 2px 6px;">Mode</th>

                  <th style="text-align:left; padding: 2px 6px;">Depth</th>

                  <th style="text-align:left; padding: 2px 6px;">Time</th>

                  <th style="text-align:left; padding: 2px 6px;">Days</th>

                  <th style="text-align:center; padding: 2px 6px;">On</th>

                  <th style="text-align:left; padding: 2px 6px;">Modified</th>

                  </tr></thead>

                  <tbody>

                  {% for r in rows.items | sort(attribute='slot') -%}

                  {% set icon = '✓' if r.status == 'synced' else ('⬆' if
                  r.status == 'pending push' else ('⬇' if r.status == 'pending
                  pull' else '★')) -%}

                  {% set days_str = r.days if r.days is string else (r.days |
                  join(',')) -%}

                  {% set lm_s = r.lm | timestamp_custom('%Y-%m-%d %H:%M', true)
                  if r.lm > 1700000000 else '—' -%}

                  <tr>

                  <td style="text-align:right; padding: 1px 6px;">{{ r.slot if
                  r.slot else '—' }}</td>

                  <td style="padding: 1px 6px;">{{ icon }} {{ r.status }}</td>

                  <td style="text-align:right; padding: 1px 6px;">{{ r.zone
                  }}</td>

                  <td style="padding: 1px 6px;">{{ r.mode }}</td>

                  <td style="padding: 1px 6px;">{{ r.depth }}</td>

                  <td style="padding: 1px 6px;">{{ r.time }}</td>

                  <td style="padding: 1px 6px;">{{ days_str }}</td>

                  <td style="text-align:center; padding: 1px 6px;">{{ '✓' if
                  r.enabled else '✗' }}</td>

                  <td style="padding: 1px 6px;">{{ lm_s }}</td>

                  </tr>

                  {% endfor -%}

                  </tbody>

                  </table>

                  {%- endif %}
              - type: entities
                title: Schedule status
                show_header_toggle: false
                entities:
                  - entity: sensor.irrigoto_desired_schedule
                    name: Desired (count)
                    secondary_info: last-updated
                  - entity: sensor.<<DEV_USC>>_schedule_pending_outbound
                    name: Push to device (HA → device)
                    secondary_info: last-updated
                  - entity: sensor.<<DEV_USC>>_schedule_pending_inbound
                    name: Pull from device (device → HA)
                    secondary_info: last-updated
                  - entity: sensor.<<DEV_USC>>_desired_rendered
                    name: This device's slice
                    icon: mdi:calendar-arrow-right
                  - entity: sensor.<<DEV_USC>>_schedule_full
                    name: This device reports
                    icon: mdi:calendar-text
                  - type: attribute
                    entity: sensor.<<DEV_USC>>_schedule_full
                    attribute: schedule_version
                    name: Device schedule_version
                    icon: mdi:counter
                  - entity: input_text.<<DEV_USC>>_last_seen_schedule_version
                    name: HA last-seen version
                    icon: mdi:counter
          - type: vertical-stack
            cards:
              - type: entities
                title: Compose entry
                show_header_toggle: false
                entities:
                  - entity: input_number.irrigoto_compose_slot
                    name: Slot (1-10)
                  - entity: input_select.irrigoto_compose_device
                    name: Device
                  - entity: input_select.irrigoto_compose_zone
                    name: Zone
                  - entity: input_select.irrigoto_compose_mode
                    name: Mode
                  - entity: input_select.irrigoto_compose_depth
                    name: Depth
                  - entity: input_datetime.irrigoto_compose_time
                    name: Time
                  - entity: input_select.irrigoto_compose_days
                    name: Days
                  - entity: input_text.irrigoto_compose_days_custom
                    name: Custom days mask (0-127, used when Days = Custom)
                  - entity: input_boolean.irrigoto_compose_enabled
                    name: Enabled
              - type: horizontal-stack
                cards:
                  - type: button
                    name: Save
                    icon: mdi:content-save-outline
                    tap_action:
                      action: perform-action
                      perform_action: script.irrigoto_compose_save_to_slot
                  - type: button
                    name: Clear slot
                    icon: mdi:close-circle-outline
                    tap_action:
                      action: perform-action
                      perform_action: script.irrigoto_compose_clear_slot
                  - type: button
                    name: Clear ALL
                    icon: mdi:delete-sweep-outline
                    tap_action:
                      action: perform-action
                      perform_action: script.irrigoto_compose_clear_all
                  - type: button
                    name: Open device editor
                    icon: mdi:open-in-new
                    tap_action:
                      action: url
                      url_path: <<DEV_URL>>/schedule
              - type: conditional
                conditions:
                  - entity: sensor.<<DEV_USC>>_irrigoto_schedule_delay
                    state: 'off'
                card:
                  type: horizontal-stack
                  cards:
                    - type: button
                      name: Delay 6h
                      icon: mdi:timer-sand
                      tap_action:
                        action: perform-action
                        perform_action: esphome.<<DEV_USC>>_delay_schedule_hours
                        data:
                          hours: 6
                    - type: button
                      name: Delay 12h
                      icon: mdi:timer-sand
                      tap_action:
                        action: perform-action
                        perform_action: esphome.<<DEV_USC>>_delay_schedule_hours
                        data:
                          hours: 12
                    - type: button
                      name: Delay 24h
                      icon: mdi:timer-sand
                      tap_action:
                        action: perform-action
                        perform_action: esphome.<<DEV_USC>>_delay_schedule_hours
                        data:
                          hours: 24
                    - type: button
                      name: Delay 48h
                      icon: mdi:timer-sand
                      tap_action:
                        action: perform-action
                        perform_action: esphome.<<DEV_USC>>_delay_schedule_hours
                        data:
                          hours: 48
              - type: conditional
                conditions:
                  - entity: sensor.<<DEV_USC>>_irrigoto_schedule_delay
                    state_not: 'off'
                card:
                  type: button
                  name: Cancel rain delay
                  icon: mdi:close-circle-outline
                  tap_action:
                    action: perform-action
                    perform_action: esphome.<<DEV_USC>>_delay_schedule_hours
                    data:
                      hours: 0
  - title: Device
    path: device
    icon: mdi:chip
    cards:
      - type: entities
        title: Status
        show_header_toggle: false
        entities:
          - entity: binary_sensor.<<DEV_USC>>_irrigoto_online
            name: Online
          - entity: sensor.<<DEV_USC>>_irrigoto_status
            name: Activity
          - entity: sensor.<<DEV_USC>>_irrigoto_last_sleep_reason
            name: Last sleep reason
          - entity: sensor.<<DEV_USC>>_irrigoto_reset_reason
            name: Reset reason
          - entity: sensor.<<DEV_USC>>_irrigoto_boot_diag
            name: Boot diagnostics
          - entity: sensor.<<DEV_USC>>_irrigoto_battery_voltage
            name: Battery
          - entity: sensor.<<DEV_USC>>_irrigoto_pressure
            name: Supply pressure
          - entity: sensor.<<DEV_USC>>_irrigoto_throw_distance
            name: Current throw distance
      - type: vertical-stack
        cards:
          - type: entities
            title: Power management
            show_header_toggle: false
            entities:
              - entity: switch.<<DEV_USC>>_irrigoto_auto_sleep
                name: Auto-sleep enabled
              - entity: number.<<DEV_USC>>_irrigoto_inactivity_timeout
                name: Inactivity timeout (min)
              - entity: number.<<DEV_USC>>_irrigoto_sleep_duration
                name: Sleep duration (s)
              - entity: number.<<DEV_USC>>_irrigoto_nozzle_dwell_timeout
                name: Nozzle dwell watchdog (s)
          - type: button
            name: Sleep 10 min
            icon: mdi:sleep
            icon_height: 36px
            tap_action:
              action: perform-action
              perform_action: esphome.<<DEV_USC>>_sleep_now
              data:
                duration_s: 600
          - type: button
            name: Open device web UI
            icon: mdi:open-in-new
            icon_height: 36px
            tap_action:
              action: url
              url_path: http://<<DEV_DASH>>.local
      - type: entities
        title: Zone backup
        show_header_toggle: false
        entities:
          - entity: input_number.<<DEV_USC>>_restore_zone_id
            name: Restore zone id
      - type: horizontal-stack
        cards:
          - type: button
            name: Backup all zones
            icon: mdi:content-save-all
            icon_height: 28px
            tap_action:
              action: perform-action
              perform_action: script.<<DEV_USC>>_backup_zones
              confirmation:
                text: "Snapshot all zones to /config/irrigoto_backups/<<DEV_DASH>>/ ?"
          - type: button
            name: Restore zone
            icon: mdi:backup-restore
            icon_height: 28px
            tap_action:
              action: perform-action
              perform_action: script.<<DEV_USC>>_restore_zone
              confirmation:
                text: "Overwrite the selected zone on the device with its backup file?"
  - title: Calibration
    path: calibration
    icon: mdi:tune
    cards:
      - type: entities
        title: State
        show_header_toggle: false
        entities:
          - entity: sensor.<<DEV_USC>>_irrigoto_calibration_state
            name: Current state
      - type: button
        name: Open cal page on device
        icon: mdi:open-in-new
        icon_height: 36px
        tap_action:
          action: url
          url_path: http://<<DEV_DASH>>.local/cal
