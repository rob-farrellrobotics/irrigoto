  - title: Chase
    path: chase
    icon: mdi:dog-side
    cards:
      - type: markdown
        content: >
          ### 🐶 Chase mode

          Slow-wandering water stream that stays inside the zone polygon —
          designed so a dog or kid can chase the spray without it ever escaping
          the boundary. Pick a duration, tap a zone. Press Stop (or the device's
          web Stop button) to end early.
      - type: entities
        title: Duration
        show_header_toggle: false
        entities:
          - entity: input_number.<<DEV_USC>>_chase_duration
            name: Chase duration
      - type: grid
        columns: 2
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.<<DEV_USC>>_zone_1_exists
                state: 'on'
            card:
              type: button
              name: Chase Zone 1
