    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: markdown
            content: >
              ### Watering depth heatmaps

              One card per zone that has been watered at least once. Each shows
              the same heatmap as the device's own zone page (🌡 → Actual),
              themed to match HA. Click ↻ in a card header to refresh. Color
              ramp: **blue** = under, **green** = on target (1/8" per pass),
              **amber/red** = over.
      - type: grid
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.<<DEV_USC>>_zone_1_exists
                state: 'on'
            card:
              type: custom:irrigoto-heatmap-card
