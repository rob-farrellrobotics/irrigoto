# irrigoto — Lovelace dashboard (SINGLE-DEVICE TEMPLATE)
#
# This file describes ONE device's dashboard using <<DEV_*>> placeholders.
# tools/ha-regen.py turns it into a multi-device dashboard: it adds a
# device picker to the top of every tab and repeats each tab's cards once
# per device, each copy wrapped in a `conditional` so only the selected
# device's cards show. You author/maintain it as if there were a single
# device; regen handles the multiplication.
#
# Install the GENERATED file (generated/dashboards/irrigoto.yaml):
#   Settings → Dashboards → + Add Dashboard → Title "Irrigoto" →
#   "New dashboard from scratch" → three-dot menu → "Edit dashboard" →
#   three-dot menu → "Raw configuration editor" → paste its contents.
#
# Uses built-in card types (entities, tile, conditional, select,
# statistics-graph, history-graph, logbook) PLUS the optional custom
# irrigoto-heatmap-card on the Heatmaps tab (install per
# homeassistant/lovelace/README.md).
#
# >>>STRIP-ON-REGEN-START<<<
# Placeholder tokens (substituted per device by ha-regen):
#   <<DEV_DASH>>  →  dashed device slug      (e.g. irrigoto-ab12cd)
#   <<DEV_USC>>   →  underscored slug         (entity IDs)
#   <<DEV_URL>>   →  device base URL
#   <<DEV_NAME>>  →  friendly name            (picker / conditional match)
# They are deliberately invalid YAML so HA errors loudly if you ever
# paste this template instead of the generated file. The device
# picker (input_select.irrigoto_active_device) and the per-tab
# conditional wrappers are injected by regen, not written here.
#
# Heatmap cards resolve the live device URL from the device's wifi_info
# ip_address entity (firmware b307+); no IP is hardcoded. The mirror_slug
# config tells the card which per-device cache folder to fall back to
# (/local/community/irrigoto/<slug>/csv/) when the device is asleep.
# ─────────────────────────────────────────────────────────────────────
# >>>STRIP-ON-REGEN-END<<<

title: Irrigoto
views:
  - title: Overview
    path: overview
    icon: mdi:sprinkler-variant
    panel: true
    cards:
      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: tile
                entity: sensor.<<DEV_USC>>_irrigoto_status
                name: Status
                icon: mdi:state-machine
                color: green
                show_entity_picture: false
                tap_action:
                  action: more-info
              - type: conditional
                conditions:
                  - entity: binary_sensor.<<DEV_USC>>_irrigoto_watering
                    state: 'on'
                card:
                  type: tile
                  entity: sensor.<<DEV_USC>>_irrigoto_water_minutes_remaining
                  name: Time remaining
                  icon: mdi:timer-sand
                  color: blue
                  show_entity_picture: false
                  tap_action:
                    action: more-info
              - type: horizontal-stack
                cards:
                  - type: tile
                    entity: binary_sensor.<<DEV_USC>>_irrigoto_online
                    name: Online
                    color: green
                  - type: tile
                    entity: binary_sensor.<<DEV_USC>>_irrigoto_watering
                    name: Watering
                    color: blue
                  - type: tile
                    entity: switch.<<DEV_USC>>_irrigoto_auto_sleep
                    name: Auto-sleep
                    color: orange
                    tap_action:
                      action: toggle
              - type: tile
                entity: switch.<<DEV_USC>>_valve
                name: Valve
                icon: mdi:valve
                color: blue
                tap_action:
                  action: toggle
              - type: entities
                state_color: false
                entities:
                  - entity: automation.irrigoto_<<DEV_USC>>_disable_auto_sleep_when_device_comes_online
                    name: Auto sleep disable on connect
              - type: entities
                title: Schedule
                show_header_toggle: false
                entities:
                  - entity: sensor.<<DEV_USC>>_irrigoto_next_scheduled_run
                    name: Next run
                    icon: mdi:clock-outline
                  - entity: sensor.<<DEV_USC>>_irrigoto_schedule_delay
                    name: Rain delay
                    icon: mdi:weather-pouring
                  - entity: sensor.<<DEV_USC>>_irrigoto_last_schedule_update
                    name: Last update
                    icon: mdi:calendar-check-outline
                  - entity: input_text.<<DEV_USC>>_schedule_mirror
                    name: Live schedule
                    icon: mdi:calendar-text
              - type: logbook
                title: Recent activity
                hours_to_show: 168
                entities:
                  - sensor.<<DEV_USC>>_watering_completions
                  - sensor.<<DEV_USC>>_watering_log
                  - sensor.<<DEV_USC>>_calibration_log
          - type: vertical-stack
            cards:
              - type: entities
                title: Current zone / mode selection
                show_header_toggle: false
                entities:
                  - entity: input_select.<<DEV_USC>>_water_zone
                    name: Zone
                  - entity: input_select.<<DEV_USC>>_water_mode
                    name: Mode
                  - entity: input_select.<<DEV_USC>>_water_depth
                    name: Depth
              - type: horizontal-stack
                cards:
                  - type: button
                    name: Start watering
                    icon: mdi:play-circle-outline
                    icon_height: 36px
                    tap_action:
                      action: perform-action
                      perform_action: script.<<DEV_USC>>_water_now
                  - type: button
                    name: Stop watering
                    icon: mdi:stop-circle-outline
                    icon_height: 36px
                    tap_action:
                      action: perform-action
                      perform_action: esphome.<<DEV_USC>>_stop
          - type: vertical-stack
            cards:
              - type: entities
                title: Last watering
                show_header_toggle: false
                entities:
                  - entity: sensor.<<DEV_USC>>_last_watering_zone
                    name: Zone
                  - entity: sensor.<<DEV_USC>>_last_watering_duration
                    name: Duration
                  - entity: sensor.<<DEV_USC>>_last_watering_volume
                    name: Volume
                  - entity: sensor.<<DEV_USC>>_last_watering_area
                    name: Area covered
                  - entity: sensor.<<DEV_USC>>_last_watering_score
                    name: Coverage score
                  - entity: sensor.<<DEV_USC>>_last_watering_status
                    name: Status
              - type: logbook
                title: Watering history
                hours_to_show: 336
                target:
                  entity_id:
                    - sensor.<<DEV_USC>>_watering_completions
              - type: entity
                entity: sensor.<<DEV_USC>>_irrigoto_battery_voltage
                name: Battery Voltage
