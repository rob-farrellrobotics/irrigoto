# irrigoto — Schedule card snippet
#
# Drop into any dashboard: open the dashboard, three-dot menu →
# "Edit dashboard" → click "+ ADD CARD" → "Manual" → paste the
# desired top-level card from below.
#
# Replace <<DEV_USC>> with your underscored device slug (e.g.
# irrigoto_xxxxxx) and <<DEV_DASH>> with the dashed form. The entity-
# id prefix construction is explained in homeassistant/README.md.

# ── Card A: Schedule overview (next run, delay, last update) ─────────
type: entities
title: Schedule
show_header_toggle: false
entities:
  - entity: sensor.<<DEV_USC>>_irrigoto_next_scheduled_run
    name: Next run
    icon: mdi:clock-outline
  - entity: sensor.<<DEV_USC>>_irrigoto_schedule_delay
    name: Rain delay
    icon: mdi:weather-pouring
  - entity: sensor.<<DEV_USC>>_irrigoto_last_schedule_update
    name: Last update
    icon: mdi:calendar-check-outline
  - entity: input_text.<<DEV_USC>>_schedule_mirror
    name: Live schedule
    icon: mdi:calendar-text

